# ══════════════════════════════════════════════════════════════════════════════
# application.properties  –  SHARED (all profiles)
# Profile-specific overrides live in application-local.properties (local dev)
# and are injected via environment variables on production (Render, etc.).
# ══════════════════════════════════════════════════════════════════════════════

# ── Active Profile ───────────────────────────────────────────────────────────
# Override with -Dspring.profiles.active=prod on the production server.
# Locally, "local" profile is used automatically.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ── Server ───────────────────────────────────────────────────────────────────
# Render injects the PORT env var; default to 8081 locally
server.port=${PORT:8081}
spring.application.name=detection

# ── Database (PostgreSQL) ────────────────────────────────────────────────────
# Production: set DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD env vars.
# Local:      values come from application-local.properties (see that file).
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/detection_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# Must be at least 32 characters for HMAC-SHA256.
# Production: set JWT_SECRET env var.  Local: see application-local.properties.
app.jwtSecret=${JWT_SECRET:local-dev-secret-key-must-be-32-chars!!}
app.jwtExpirationMs=${JWT_EXPIRATION_MS:86400000}

# ── Google OAuth2 ────────────────────────────────────────────────────────────
# Production: set GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET env vars.
# Local:      see application-local.properties.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ── Email (SMTP / Gmail) ─────────────────────────────────────────────────────
# Production: set MAIL_USERNAME / MAIL_PASSWORD env vars.
# Local:      see application-local.properties.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.doc-expansion=list
